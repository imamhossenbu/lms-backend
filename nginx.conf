events {}
http {
    server {
        listen 80;
        server_name localhost;
        resolver 127.0.0.11 valid=5s;

        location / {
            set $upstream_app app;
            proxy_pass http://$upstream_app:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}